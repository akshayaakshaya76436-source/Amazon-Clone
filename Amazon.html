<!DOCTYPE html>
<html>
    <head>
        <title>Amazon website</title>
        <link rel="stylesheet" type="text/css" href="Amazon.css">
    </head>
    <body>
       <section class="navbar">
       <img src="logo.png" class="logo">
       <div class="location"><h3>Deliver to</h3><h2>Ghatkesar</h2>
        <button><img src="./location.png" class="loc">update location</button>
       </div>
       <input type="text" placeholder="Search" class="Search">
       <select class="country">
       <option>INDIA</option>
       <option>AUSTRALIA</option>
       <option>UK</option>
       <option>USA</option>
       <option>CANADA</option>
       </select>
       <button><img src="account.png.jpg" class="account"></button>
       <button><img src="cart.png.jpg" class="cart"></button>
       </section>
       <section class="search_icon">
       <select class="All">
       <option selected disabled>ALL</option>
       <option  disabled style="font-weight:bold">Trending</option>
       <option>Best sellers</option>
       <option>New release</option>
       <hr>
       <option disabled style="font-weight:bold">Shop by category</option>
        <option>Mobiles and computers</option>
        <option>TV,Appliances,Electronics</option>
        <option>Mens Fashion</option>
        <option>Womens Fashion</option>
        <hr>
        <option>Home,kitchen,pets</option>
        <option>beauty,health,grocery</option>
        <option>sports,fitness,bags,luggage</option>
        <option>toys,baby products,kids Fashion</option>
        <option>book</option>
        <option>car,motorbikes,industrial</option>
        <option>movies,music&video games</option>
        <hr>
        <option disabled style="font-weight:bold">Programs&Features</option>
        <option>Gift cards & Mobile Recharge</option>
        <option>Amazon Launchpad</option>
        <option>Amazon Business</option>
        <option>Handlooms and Handcrafts</option>
        <hr>
        <option disabled style="font-weight:bold">Help & Settings</option>
        <option>Your Account</option>
        <option>Customer Service</option>
        <option>Sign in</option>
        <select class="buttons">
        <button>Fresh</button>
        <button>MX player</button>
        <button>Sell</button>
        <button>Best Seller</button>
        <button>Today's Deals</button>
        <button>New Release</button>
        </select>
        </section>
        <section>
            <div class="Banner"><img src="./images.png" alt="Image"></div>
        </section>
        <section class="Products">
            <div class="Box"><img src="bag.png" alt="Product 1"></div>
            <div class="Box"><img src="jewellery.png" alt="Product 2"></div>
            <div class="Box"><img src="kurthi.png" alt="Product 3"></div>
            <div class="Box"><img src="kid2.png" alt="Product 4"></div>
            <div class="Box"><img src="shoes.png" alt="Product 4"></div>
            <div class="Box"><img src="watch.png" alt="Product 5"></div>
            <div class="Box"><img src="laptop.png" alt="Product 6"></div>
            <div class="Box"><img src="kettle.png" alt="Product 7"></div>
        </section>
        <footer>
            <div class="top">Back to top</div>
            <div class="bottom">
                <p>&copy; 2026 Amazon. All rights reserved.</p>
                Get to know us<br>
                Contact us<br>
                Help
            </div>
        </footer>       
    </body>
</html>
